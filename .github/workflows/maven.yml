# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Install Xvfb (pour JavaFX headless)
      run: sudo apt-get install -y xvfb
    
    - name: Build, test and coverage
      run: xvfb-run mvn -B package jacoco:report --file project/pom.xml
    
    - name: Publish test results
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/surefire-reports/*.xml'
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: project/target/site/jacoco/

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: project/target/site/jacoco/jacoco.xml

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: project/target/*.jar
